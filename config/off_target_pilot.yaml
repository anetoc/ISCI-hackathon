contract_version: off_target_pilot_v1
status: FROZEN_NOT_EXECUTED
frozen_at: 2026-07-12

scientific_reference:
  assembly_accession: GCF_000001405.40
  assembly_name: GRCh38.p14
  annotation_release: GCF_000001405.40-RS_2025_08
  annotation_bed_status: BLOCKED_DERIVATION_NOT_EXECUTED

engine:
  name: CRISPRitz
  version: 2.7.0
  source_commit: 24b893ecb0c2354d5c76697e116d2febe1ee6265
  distribution: bioconda
  platform: linux-64
  package_build: py39h2de1943_0
  package_sha256: 88aa3073a76f8b74b2a869ecf921c59241cf19267df877bafc285b8620cfc215
  docker_latest_status: DISALLOWED_VERSION_NOT_ALIGNED_WITH_2_7_0

crispr_contract:
  modality: CRISPRa
  nuclease_family: SpCas9
  protospacer_length: 20
  pam_pattern: NGG
  pam_file_line: NNNNNNNNNNNNNNNNNNNNNGG 3

official_installation_control:
  source: CRISPRitz test_scripts
  guide_id: CRISPRITZ_OFFICIAL_EMX1
  guide_with_pam_placeholder: GAGTCCGAGCAGAAGAAGAANNN
  reference_scope: UCSC_hg38_chr22_INSTALLATION_ONLY
  mismatch_ceiling: 4
  dna_bulge_ceiling: 1
  rna_bulge_ceiling: 1
  boundary: Installation control only; it cannot adjudicate the project guides.

pilot_stages:
  - id: S0_INSTALLATION_SMOKE
    input: CRISPRITZ_OFFICIAL_EMX1
    genome_scope: UCSC_hg38_chr22_INSTALLATION_ONLY
    search_mode: MISMATCH_ONLY
    mismatch_ceiling: 4
    dna_bulge_ceiling: 0
    rna_bulge_ceiling: 0

  - id: S1_PRIORITY_REFERENCE_SEARCH
    input: ALL_CURRENT_AND_FALLBACK_GUIDES_FOR_HIGH_PRIORITY_TARGETS
    expected_targets: [TNFRSF9, TBX21]
    genome_scope: GCF_000001405.40
    search_mode: MISMATCH_ONLY
    mismatch_ceiling: 4
    dna_bulge_ceiling: 0
    rna_bulge_ceiling: 0

  - id: S2_FULL_REFERENCE_SEARCH
    input: ALL_78_CURRENT_AND_FALLBACK_CANDIDATES
    genome_scope: GCF_000001405.40
    search_mode: MISMATCH_ONLY
    mismatch_ceiling: 4
    dna_bulge_ceiling: 0
    rna_bulge_ceiling: 0
    requires: S1_PRIORITY_REFERENCE_SEARCH_PASS

  - id: S3_BULGE_SENSITIVITY
    input: ALL_78_CURRENT_AND_FALLBACK_CANDIDATES
    genome_scope: GCF_000001405.40_INDEXED
    search_mode: MISMATCH_AND_BULGES
    mismatch_ceiling: 4
    dna_bulge_ceiling: 1
    rna_bulge_ceiling: 1
    requires: S2_FULL_REFERENCE_SEARCH_PASS

acceptance:
  repeated_runs: 2
  require_identical_target_rows_after_canonical_sort: true
  require_nonempty_targets_and_profiles: true
  require_input_output_sha256: true
  require_engine_package_and_reference_hashes: true
  require_wall_time_peak_rss_and_disk_usage: true
  require_zero_unexpected_stderr: true
  result_status_if_all_stages_pass: TECHNICAL_OFF_TARGET_RESULTS_READY_FOR_REVIEW

promotion_boundary:
  automatic_replacements: 0
  synthesis_approval: false
  reason: Off-target enumeration alone does not establish CRISPRa on-target activity, TSS placement, vector compatibility, or biological efficacy.

sources:
  - https://github.com/pinellolab/CRISPRitz/releases/tag/v2.7.0
  - https://api.anaconda.org/release/bioconda/crispritz/2.7.0
  - https://raw.githubusercontent.com/pinellolab/CRISPRitz/master/test_scripts/auto_test_crispritz_docker.sh
  - https://raw.githubusercontent.com/pinellolab/CRISPRitz/master/test_scripts/EMX1.sgRNA.txt
  - https://raw.githubusercontent.com/pinellolab/CRISPRitz/master/test_scripts/20bp-NGG-SpCas9.txt
