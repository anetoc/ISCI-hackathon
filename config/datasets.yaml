# CCI evidence registry
# ---------------------
# This registry records legacy cross-system results consumed by isci/run_cci.py. It is separate
# from the supported bring-your-own-data interface (`DatasetSpec v1` + `isci pipeline`). Adding a
# block here alone does not make a new dataset executable or eligible for a biological verdict.

schema_version: 1

# Which axis/label to test controllership against, and how positives are defined.
defaults:
  effect_layer: zscore            # layer used for effect size / axis scoring
  magnitude_col: n_total_de_genes # per-perturbation effect-magnitude proxy
  detectable_quantile: 0.5        # gate: keep perturbations with magnitude >= this quantile
  donor_col: null                 # set per-dataset if cross-donor coherence is computable
  n_bootstrap: 1000
  seed: 0

datasets:
  - id: marson_cd4
    label: "Marson CD4+ (primary)"
    system: immune                 # immune | non-immune  (drives the scope prediction)
    perturbation: "KD/KO"
    path: data/GWCD4i.DE_stats.h5ad
    source_url: s3://genome-scale-tcell-perturb-seq/marson2025_data/GWCD4i.DE_stats.h5ad
    license_note: Not redistributed; verify the dataset authors' current reuse terms.
    adapter: marson                # -> isci.adapters.marson
    donor_col: donor
    condition_col: culture_condition
    conditions: [Rest, Stim8hr, Stim48hr]
    positives: known_regulators    # ground-truth positive set for regulator recovery
    status: done                   # done | queued | gated
    expected_verdict: PASS

  - id: schmidt_crispra
    label: "Schmidt GSE190604"
    system: immune
    perturbation: "CRISPRa"
    path: data_public/schmidt/GSE190604.h5ad
    accession: GSE190604
    source_url: https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE190604
    license_note: Not redistributed; reuse remains subject to NCBI and source-publication terms.
    adapter: generic_perturbseq
    positives: known_regulators
    status: done
    expected_verdict: NEAR-MISS

  - id: norman_k562
    label: "Norman & Weissman K562"
    system: non-immune
    perturbation: "CRISPRa (differentiation)"
    path: data_public/norman/norman2019_k562.h5ad
    source_note: Public Norman and Weissman 2019 K562 Perturb-seq release; verify source terms.
    license_note: Not redistributed.
    adapter: generic_perturbseq
    positives: curated
    status: done
    expected_verdict: FAIL

  - id: replogle_rpe1
    label: "Replogle RPE1 (essential)"
    system: non-immune
    perturbation: "CRISPRi (proliferation)"
    path: data_public/replogle/replogle_rpe1_essential.h5ad
    source_note: Public Replogle RPE1 essential-screen release; verify source terms.
    license_note: Not redistributed.
    adapter: generic_perturbseq
    positives: hart_essentials
    status: done
    expected_verdict: FAIL

  # ---- Legacy registry example; use DatasetSpec v1 for supported public integrations ----
  # - id: my_new_screen
  #   label: "My new immune Perturb-seq"
  #   system: immune
  #   perturbation: "KO"
  #   path: data_public/mine/screen.h5ad
  #   adapter: generic_perturbseq       # legacy dashboard adapter
  #   donor_col: donor                  # omit if single-donor
  #   positives: known_regulators       # known_regulators | curated | hart_essentials | custom:<file>
  #   status: queued
  #   expected_verdict: null            # your pre-registered prediction (PASS/FAIL) — falsifiable!
